# .github/workflows/deploy.yml

# 工作流的名称
name: deploy-react-to-pages

# 触发条件：当代码被推送到 main 分支时运行
on:
  push:
    branches: [ "main" ]

# 关键权限设置：允许工作流写入内容并部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：确保只有一个部署任务在运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建与部署任务
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库最新代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. 设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 根据你的项目实际情况选择版本
          cache: 'npm'
      
      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm ci
      
      # 4. 构建项目，生成静态文件
      - name: Build
        run: npm run build
        # 注意：新版React (Vite/CRA) 构建输出目录通常为 'dist'，老版本CRA为 'build'
        # 请检查你的项目根目录下的配置文件（如vite.config.js）中 build.outDir 的设置，并相应调整下面路径
      
      # 5. 配置部署工具
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # 6. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 请将 'dist' 替换为项目构建输出目录：旧版CRA是'build'，新版CRA或Vite通常是'dist'
          path: 'dist'
      
      # 7. 执行部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4